name: E2E

on:
  push:
    branches: [main]
    paths: [install.sh]
  pull_request:
    paths: [install.sh]
  repository_dispatch:
    types: [sznuper-release]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to test (e.g. v1.2.0)"
        required: true

jobs:
  install:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x86-64
            server_type: cx23
          - arch: aarch64
            server_type: cax11
    steps:
      - uses: actions/checkout@v6

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "tag=${{ github.event.client_payload.tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            tag=$(gh release list --repo sznuper/sznuper --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")
            if [ -z "$tag" ]; then
              echo "::error::No sznuper release found to test against"
              exit 1
            fi
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Test install on VPS
        run: ./dev/test-install.sh
        env:
          SERVER_NAME: sznuper-e2e-${{ matrix.arch }}
          SERVER_TYPE: ${{ matrix.server_type }}
          HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
          SSH_KEY: ${{ secrets.HETZNER_SSH_KEY_NAME }}
          VERSION: ${{ steps.tag.outputs.tag }}

      - name: Cleanup VPS (safety net)
        if: always()
        run: |
          SERVER_ID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.HETZNER_API_TOKEN }}" \
            "https://api.hetzner.cloud/v1/servers?name=$SERVER_NAME" | \
            jq -r '.servers[0].id // ""')
          if [[ -n "$SERVER_ID" ]]; then
            curl -s -o /dev/null -X DELETE \
              -H "Authorization: Bearer ${{ secrets.HETZNER_API_TOKEN }}" \
              "https://api.hetzner.cloud/v1/servers/$SERVER_ID"
            echo "Deleted leftover server $SERVER_ID ($SERVER_NAME)"
          fi
        env:
          SERVER_NAME: sznuper-e2e-${{ matrix.arch }}
